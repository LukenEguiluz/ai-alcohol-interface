services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_alcohol
      POSTGRES_USER: ai_alcohol
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_alcohol_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_alcohol -d ai_alcohol"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ai_alcohol
      POSTGRES_USER: ai_alcohol
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_alcohol_secret}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-change-in-production}
      DEBUG: "True"
    volumes:
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    # La base de datos persiste aquí; cambios en el código no la borran
  media_data:
    # Vídeos/audios subidos persisten aquí
