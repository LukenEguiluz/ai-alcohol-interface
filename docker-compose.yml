# Un solo puerto (3000): interfaz en / y API en /api (evitando 8080 y 5000)
# PostgreSQL: 5433 por si conectas desde fuera

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_alcohol
      POSTGRES_USER: ai_alcohol
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_alcohol_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_alcohol -d ai_alcohol"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ai_alcohol
      POSTGRES_USER: ai_alcohol
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_alcohol_secret}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-change-in-production}
      DEBUG: ${DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      MAX_VIDEO_UPLOAD_MB: ${MAX_VIDEO_UPLOAD_MB:-850}
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    # No se expone en el host: se accede por el mismo puerto que el front, en /api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
