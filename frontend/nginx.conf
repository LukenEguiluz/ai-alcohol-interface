server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Vídeos grandes (coherente con MAX_VIDEO_UPLOAD_MB en Django, p. ej. 850 MB → 900m)
    client_max_body_size 900m;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # API → backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-View-As-Role $http_x_view_as_role;
    }

    # Archivos media (vídeos/audios) → backend
    location /media/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA: devolver index.html para rutas del front
    location / {
        try_files $uri $uri/ /index.html;
    }
}
